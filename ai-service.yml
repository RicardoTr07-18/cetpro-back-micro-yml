spring:
  application:
    name: ai-service

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3

  cache:
    type: redis
    redis:
      time-to-live: 6s

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

server:
  port: 8090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 30

  instance:
    prefer-ip-address: true
    hostname: localhost
    lease-renewal-interval-seconds: 15
    lease-expiration-duration-seconds: 40

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: info, health, prometheus
  info:
    env:
      enabled: true

logging:
  level:
    root: warn                       # ⚡ Menos carga en consola
    org.springframework: info

info:
  app:
    name: ai-service
    description: "Servicio basado en inteligencia artificial para la automatización de tareas y procesamiento de datos."
    version: 1.0.0
    author: Ricardo Terrazas
    environment: desarrollo
    license: MIT
    contact:
      email: ricardo@gmail.com
    tags:
      - inteligencia artificial
      - automatización
      - procesamiento de datos
    dependencies:
      - tensorflow
      - pandas
      - numpy
      - flask
